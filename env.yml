name: sam3_env
# Miniforge3 / Mambaforge compatible – no Anaconda "defaults" channel needed.
channels:
  - nvidia           # CUDA toolkit packages (nccl, cudnn, etc.)
  - conda-forge      # primary channel for Miniforge3
channel_priority: strict

dependencies:
  # ── Python ─────────────────────────────────────────────────────────────────
  - python=3.12

  # ── System-level / conda-preferred packages ─────────────────────────────────
  - conda-forge::ffmpeg          # required by opencv for video read/write
  - conda-forge::opencv          # image/video I/O (opencv-python replacement)
  - conda-forge::pillow          # PIL – image loading
  - conda-forge::numpy>=1.26,<2  # numerical arrays
  - conda-forge::tqdm            # progress bars
  - conda-forge::scikit-image    # used by visualization_utils
  - conda-forge::libstdcxx-ng    # provides CXXABI_1.3.15+ needed by scipy/sklearn compiled with GCC 13
  - conda-forge::scipy           # conda build avoids libstdc++ ABI mismatch from pip wheels
  - conda-forge::scikit-learn    # used by visualization_utils (KMeans)
  - conda-forge::matplotlib      # optional but handy for local inspection
  - conda-forge::psutil          # required by sam3 video predictor internals
  - conda-forge::pip             # ensure pip is managed inside the env

  # ── pip-only packages ────────────────────────────────────────────────────────
  - pip:
    # ── PyTorch stack (CUDA 12.8 wheels – compatible with CUDA 13.x drivers) ─
    # PyTorch does not yet publish cu131 wheels; cu128 is the highest available
    # and runs fine on CUDA 13.1 thanks to CUDA backward compatibility.
    # NOTE: --extra-index-url (not --index-url) so that PyPI remains available
    # for all other packages (wheel, setuptools, timm, etc.).
    # Change cu128 → cu126 / cu124 etc. if you have an older CUDA version.
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch==2.10.0+cu128
    - torchvision==0.25.0+cu128

    # ── SAM3 package itself (editable install from repo root) ──────────────
    - -e .

    # ── Core SAM3 dependencies (from pyproject.toml [project.dependencies]) ─
    - timm>=1.0.17
    - ftfy==6.1.1
    - regex
    - iopath>=0.1.10
    - typing_extensions
    - huggingface_hub

    # ── [notebooks] extras – needed by sam3_auto_segment.py ─────────────────
    # (opencv already installed via conda above; listed here for completeness)
    - pycocotools          # mask encode/decode used in visualization_utils
    - einops               # optional fast ops; also needed by flash-attn
    - decord               # fast video decoder (alternative to cv2 for video)

    # ── Florence-2 (vocabulary discovery in sam3_scene_segment.py) ─────────
    # >=4.41: Florence-2 built-in (no trust_remote_code, no flash_attn hard dep)
    # <4.45:  avoids sklearn import in candidate_generator.py (CXXABI ABI error)
    - transformers>=4.41,<4.45    # Florence-2 AutoProcessor / AutoModelForCausalLM

    # ── HuggingFace (OPTIONAL – only needed if no local checkpoint) ────────
    # The script auto-detects ckpt/sam3.pt and ckpt/sam3.1_multiplex.pt.
    # If neither is present it will attempt an HF download; in that case run:
    #   hf auth login
    # and request access at https://huggingface.co/facebook/sam3

    # ── Optional: Flash Attention 3 (significant speedup on Ampere+ GPUs) ───
    # Uncomment the two lines below if you have a compatible GPU and CUDA 12.8+:
    # - ninja                                         # build dependency for flash-attn
    # - flash-attn-3 --no-deps --index-url https://download.pytorch.org/whl/cu128
    # Then in sam3_auto_segment.py set use_fa3=True inside segment_video_sequence().

    # ── Optional: cc_torch (faster NMS for large mask counts) ───────────────
    # Uncomment if needed:
    # - git+https://github.com/ronghanghu/cc_torch.git

